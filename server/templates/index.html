<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 600px; width: 90%; }
        h1 { color: #667eea; margin-bottom: 20px; }
        .status { background: #f0f4ff; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #667eea; }
        .status.online { border-left-color: #10b981; }
        .status-badge { display: inline-block; padding: 5px 15px; background: #10b981; color: white; border-radius: 20px; font-size: 14px; margin-bottom: 10px; }
        .content { margin: 20px 0; line-height: 1.6; color: #333; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        a { text-decoration: none; padding: 10px 20px; border-radius: 5px; font-size: 14px; transition: all 0.3s; }
        .btn-admin { background: #667eea; color: white; }
        .btn-admin:hover { background: #764ba2; }
        .timestamp { color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ content.title }}</h1>
        <div class="status online" id="status">
            <div class="status-badge">🟢 Online</div>
            <div id="status-text">Lädt...</div>
        </div>
        <div class="content">
            {{ content.content }}
        </div>
        <div class="buttons">
            <a href="/admin/login" class="btn-admin">Admin Login</a>
        </div>
    </div>

    <script>
        // Server-Status laden
        fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                document.getElementById('status-text').innerHTML = 
                    `<strong>${data.server_name}</strong><br>${data.message}<div class="timestamp">${new Date(data.timestamp).toLocaleString('de-DE')}</div>`;
            })
            .catch(e => {
                document.getElementById('status-text').innerHTML = '<strong>Fehler</strong><br>Status konnte nicht abgerufen werden.';
            });
    </script>
</body>
</html>
