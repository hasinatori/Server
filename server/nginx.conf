# Nginx Konfiguration für Flask App
# Speichern unter: /etc/nginx/sites-available/server
# Aktivieren: sudo ln -s /etc/nginx/sites-available/server /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

upstream flask_app {
    server 127.0.0.1:5000;
}

# HTTP zu HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example.com;

    # Let's Encrypt Verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alle anderen Requests zu HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example.com;

    # SSL Certificates (von Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;

    # SSL Sicherheitseinstellungen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/server_access.log;
    error_log /var/log/nginx/server_error.log;

    # Max Upload Size
    client_max_body_size 10M;

    # Proxy zur Flask App
    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket Support (falls benötigt)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # Statische Dateien cachen
    location ~* ^/(static|media|assets)/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
